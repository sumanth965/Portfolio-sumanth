<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio | Sumanth</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0B0C15',
                            card: '#151725',
                            accent: '#6366f1', // Indigo
                            secondary: '#ec4899', // Pink
                            cyan: '#06b6d4'
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0C15;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4f46e5;
        }

        /* Grid Background Pattern */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* Spotlight Utility */
        .spotlight-card {
            position: relative;
            overflow: hidden;
        }

        .spotlight-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(99, 102, 241, 0.15), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 10;
        }

        .spotlight-card:hover .spotlight-overlay {
            opacity: 1;
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(to right, #6366f1, #ec4899, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientMove 5s linear infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }
    </style>
</head>

<body class="bg-brand-dark text-white overflow-x-hidden selection:bg-brand-accent selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;

        // --- Professional Loader Component ---
        const Preloader = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setProgress(old => {
                        if (old >= 100) {
                            clearInterval(timer);
                            return 100;
                        }
                        return old + Math.floor(Math.random() * 10) + 1;
                    });
                }, 100);

                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (progress === 100) {
                    setTimeout(onComplete, 500); // Slight delay at 100% before exit
                }
            }, [progress, onComplete]);

            return (
                <motion.div
                    className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-brand-dark"
                    exit={{ y: "-100%", transition: { duration: 0.8, ease: [0.76, 0, 0.24, 1] } }}
                >
                    <div className="w-64 relative">
                        <div className="flex justify-between text-xs text-gray-400 mb-2 uppercase tracking-widest font-semibold">
                            <span>Loading Assets</span>
                            <span>{Math.min(progress, 100)}%</span>
                        </div>
                        <div className="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                            <motion.div
                                className="h-full bg-gradient-to-r from-brand-accent to-brand-cyan"
                                initial={{ width: 0 }}
                                animate={{ width: `${Math.min(progress, 100)}%` }}
                                transition={{ ease: "circOut" }}
                            />
                        </div>
                    </div>
                </motion.div>
            );
        };

        // --- Tech Decoration Component (Floating Rings) ---
        const TechRings = () => (
            <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
                {/* Outer Ring */}
                <motion.div
                    animate={{ rotate: 360 }}
                    transition={{ duration: 20, repeat: Infinity, ease: "linear" }}
                    className="absolute w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] border border-gray-800 rounded-full opacity-20"
                />
                {/* Inner Dashed Ring */}
                <motion.div
                    animate={{ rotate: -360 }}
                    transition={{ duration: 15, repeat: Infinity, ease: "linear" }}
                    className="absolute w-[240px] h-[240px] sm:w-[320px] sm:h-[320px] border border-dashed border-brand-accent rounded-full opacity-30"
                />
                {/* Small Satellites */}
                {[0, 1, 2].map((i) => (
                    <motion.div
                        key={i}
                        animate={{ rotate: 360 }}
                        transition={{ duration: 10 + i * 2, repeat: Infinity, ease: "linear" }}
                        className="absolute w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] flex items-start justify-center"
                        style={{ transform: `rotate(${i * 120}deg)` }}
                    >
                        <div className="w-2 h-2 bg-brand-cyan rounded-full shadow-[0_0_10px_#06b6d4]" />
                    </motion.div>
                ))}
            </div>
        );

        // --- Profile Card with Mouse Spotlight ---
        const ProfileCard = () => {
            const divRef = useRef(null);
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });

            const handleMouseMove = (e) => {
                if (!divRef.current) return;
                const rect = divRef.current.getBoundingClientRect();
                setMousePosition({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                });
            };

            return (
                <div
                    ref={divRef}
                    onMouseMove={handleMouseMove}
                    className="relative w-full max-w-md mx-auto group perspective-1000"
                >
                    {/* Card Container */}
                    <motion.div
                        initial={{ rotateY: 10, rotateX: 10, opacity: 0, z: -100 }}
                        animate={{ rotateY: 0, rotateX: 0, opacity: 1, z: 0 }}
                        transition={{ duration: 1, delay: 0.5, type: "spring" }}
                        whileHover={{ scale: 1.02 }}
                        className="relative spotlight-card rounded-2xl bg-brand-card/50 backdrop-blur-xl border border-gray-800/50 p-2 shadow-2xl"
                        style={{ "--mouse-x": `${mousePosition.x}px`, "--mouse-y": `${mousePosition.y}px` }}
                    >
                        <div className="spotlight-overlay rounded-xl" />

                        {/* Image Content */}
                        <div className="relative rounded-xl overflow-hidden aspect-[4/5] sm:aspect-square bg-gray-900">
                            {/* Placeholder for user image - Using a high quality Unsplash portrait for demo */}
                            <img
                                src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                alt="Sumanth Profile"
                                className="object-cover w-full h-full transform transition-transform duration-700 group-hover:scale-110"
                                loading="eager"
                            />
                            {/* Overlay Gradient */}
                            <div className="absolute inset-0 bg-gradient-to-t from-brand-dark/80 via-transparent to-transparent opacity-60" />

                            {/* Tech Rings Inside Card */}
                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                <TechRings />
                            </div>

                            {/* Badge */}
                            <div className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-brand-accent/30 flex items-center gap-2">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                                <span className="text-xs font-mono text-gray-300">Available for work</span>
                            </div>
                        </div>
                    </motion.div>

                    {/* Decorative blurred glow behind card */}
                    <div className="absolute -inset-4 bg-brand-accent/20 blur-3xl rounded-full opacity-30 -z-10 animate-blob" />
                </div>
            );
        };

        // --- Main Hero Component ---
        const Hero = () => {
            const [loading, setLoading] = useState(true);

            return (
                <>
                    <AnimatePresence>
                        {loading && <Preloader onComplete={() => setLoading(false)} />}
                    </AnimatePresence>

                    <section className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
                        {/* Background Elements */}
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-grid" />
                            {/* Gradient Blobs */}
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-accent/10 rounded-full blur-3xl animate-blob" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-brand-cyan/10 rounded-full blur-3xl animate-blob" style={{ animationDelay: '2s' }} />
                        </div>

                        <div className="container mx-auto px-6 z-10 relative">
                            <div className="flex flex-col-reverse lg:flex-row items-center justify-between gap-12 lg:gap-20">

                                {/* Text Section */}
                                <motion.div
                                    initial={{ opacity: 0, x: -50 }}
                                    animate={loading ? {} : { opacity: 1, x: 0 }}
                                    transition={{ duration: 0.8, delay: 0.2 }}
                                    className="flex-1 text-center lg:text-left space-y-6"
                                >
                                    <motion.div
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={loading ? {} : { opacity: 1, y: 0 }}
                                        transition={{ delay: 0.3 }}
                                    >
                                        <span className="inline-block px-3 py-1 rounded-full bg-brand-accent/10 border border-brand-accent/20 text-brand-accent text-xs font-bold tracking-wider uppercase mb-4">
                                            Full Stack Developer
                                        </span>
                                    </motion.div>

                                    <h1 className="text-5xl sm:text-6xl lg:text-7xl font-display font-bold leading-tight">
                                        Hi, I'm <br />
                                        <span className="text-gradient">Sumanth</span>
                                    </h1>

                                    <motion.p
                                        className="text-gray-400 text-lg max-w-lg mx-auto lg:mx-0 leading-relaxed"
                                        initial={{ opacity: 0 }}
                                        animate={loading ? {} : { opacity: 1 }}
                                        transition={{ delay: 0.6 }}
                                    >
                                        I build scalable, user-centric applications with the <span className="text-white font-semibold">MERN stack</span>.
                                        Passionate about transforming complex problems into elegant digital solutions.
                                    </motion.p>

                                    <motion.div
                                        className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start pt-4"
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={loading ? {} : { opacity: 1, y: 0 }}
                                        transition={{ delay: 0.8 }}
                                    >
                                        <a
                                            href="#projects"
                                            className="px-8 py-3.5 rounded-lg bg-brand-accent hover:bg-indigo-600 text-white font-semibold transition-all duration-300 shadow-lg hover:shadow-indigo-500/25 flex items-center justify-center gap-2 group"
                                        >
                                            View Projects
                                            <svg className="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                                        </a>

                                        <a
                                            href="#contact"
                                            className="px-8 py-3.5 rounded-lg border border-gray-700 hover:border-gray-500 hover:bg-white/5 text-white font-medium transition-all duration-300 flex items-center justify-center"
                                        >
                                            Contact Me
                                        </a>
                                    </motion.div>

                                    {/* Stats/Social Proof */}
                                    <motion.div
                                        className="pt-8 flex items-center justify-center lg:justify-start gap-8 text-gray-500"
                                        initial={{ opacity: 0 }}
                                        animate={loading ? {} : { opacity: 1 }}
                                        transition={{ delay: 1 }}
                                    >
                                        <div className="flex flex-col">
                                            <span className="text-2xl font-bold text-white">1+</span>
                                            <span className="text-xs uppercase tracking-wider">Years Exp</span>
                                        </div>
                                        <div className="w-px h-8 bg-gray-800" />
                                        <div className="flex flex-col">
                                            <span className="text-2xl font-bold text-white">10+</span>
                                            <span className="text-xs uppercase tracking-wider">Projects</span>
                                        </div>
                                    </motion.div>
                                </motion.div>

                                {/* Image Section */}
                                <motion.div
                                    className="flex-1 w-full flex justify-center perspective-container"
                                    initial={{ opacity: 0, scale: 0.8 }}
                                    animate={loading ? {} : { opacity: 1, scale: 1 }}
                                    transition={{ duration: 0.8 }}
                                >
                                    <ProfileCard />
                                </motion.div>
                            </div>
                        </div>

                        {/* Scroll Indicator */}
                        {loading === false && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1, y: [0, 10, 0] }}
                                transition={{ delay: 1.5, duration: 2, repeat: Infinity }}
                                className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-gray-500"
                            >
                                <span className="text-[10px] uppercase tracking-widest">Scroll</span>
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                            </motion.div>
                        )}
                    </section>
                </>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-brand-dark selection:bg-brand-accent">
                    <Hero />
                    {/* Placeholder for other sections to show scrolling capability */}
                    <section id="projects" className="h-[50vh] flex items-center justify-center border-t border-gray-800/50">
                        <h2 className="text-3xl font-display font-bold text-gray-700">Projects Section</h2>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
